name: Infrastructure Deployment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment (dev, staging, prod)'
      location:
        required: false
        type: string
        default: 'eastus'
        description: 'Azure region for deployment'
    secrets:
      AZURE_CREDENTIALS:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AXIOM_WEBHOOK_SECRET:
        required: false

  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        description: 'Target environment'
      location:
        required: false
        type: string
        default: 'eastus'
        description: 'Azure region for deployment'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    # All secrets below are pulled from the GitHub environment (dev/staging/prod)
    # Configure these in: GitHub → Settings → Environments → [environment] → Secrets
    env:
      BATCHDATA_KEY: ${{ secrets.BATCHDATA_KEY }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      BRIDGE_SERVER_TOKEN: ${{ secrets.BRIDGE_SERVER_TOKEN }}
      NPS_API_KEY: ${{ secrets.NPS_API_KEY }}
      SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
      AZURE_COMMUNICATION_API_KEY: ${{ secrets.AZURE_COMMUNICATION_API_KEY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AXIOM_WEBHOOK_SECRET: ${{ secrets.AXIOM_WEBHOOK_SECRET }}
    
    outputs:
      resource-group: ${{ steps.deploy.outputs.resourceGroupName }}
      app-service-name: ${{ steps.deploy.outputs.appServiceName }}
      app-service-url: ${{ steps.deploy.outputs.appServiceUrl }}
      key-vault-name: ${{ steps.deploy.outputs.keyVaultName }}
      sftp-storage-account-name: ${{ steps.deploy.outputs.sftpStorageAccountName }}
      apim-name: ${{ steps.deploy.outputs.apimName }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Set Azure subscription
      run: az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}
      
    - name: Validate Bicep template
      run: |
        echo "🔍 Validating Bicep template for ${{ inputs.environment }}..."
        PARAM_FILE="infrastructure/parameters/${{ inputs.environment }}.parameters.json"
        PARAM_ARGS=(--parameters "@${PARAM_FILE}")
        
        # Add secret parameters if they exist
        [ -n "$BATCHDATA_KEY" ] && PARAM_ARGS+=("batchDataApiKey=$BATCHDATA_KEY")
        [ -n "$GOOGLE_MAPS_API_KEY" ] && PARAM_ARGS+=("googleMapsApiKey=$GOOGLE_MAPS_API_KEY")
        [ -n "$AZURE_OPENAI_API_KEY" ] && PARAM_ARGS+=("azureOpenAiApiKey=$AZURE_OPENAI_API_KEY")
        [ -n "$AZURE_OPENAI_ENDPOINT" ] && PARAM_ARGS+=("azureOpenAiEndpoint=$AZURE_OPENAI_ENDPOINT")
        [ -n "$GOOGLE_GEMINI_API_KEY" ] && PARAM_ARGS+=("googleGeminiApiKey=$GOOGLE_GEMINI_API_KEY")
        [ -n "$CENSUS_API_KEY" ] && PARAM_ARGS+=("censusApiKey=$CENSUS_API_KEY")
        [ -n "$BRIDGE_SERVER_TOKEN" ] && PARAM_ARGS+=("bridgeServerToken=$BRIDGE_SERVER_TOKEN")
        [ -n "$NPS_API_KEY" ] && PARAM_ARGS+=("npsApiKey=$NPS_API_KEY")
        [ -n "$SAMBANOVA_API_KEY" ] && PARAM_ARGS+=("sambanovaApiKey=$SAMBANOVA_API_KEY")
        [ -n "$AZURE_COMMUNICATION_API_KEY" ] && PARAM_ARGS+=("azureCommunicationApiKey=$AZURE_COMMUNICATION_API_KEY")
        [ -n "$AZURE_TENANT_ID" ] && PARAM_ARGS+=("azureTenantId=$AZURE_TENANT_ID")
        [ -n "$AZURE_CLIENT_ID" ] && PARAM_ARGS+=("azureClientId=$AZURE_CLIENT_ID")
        [ -n "$AZURE_CLIENT_SECRET" ] && PARAM_ARGS+=("azureClientSecret=$AZURE_CLIENT_SECRET")
        [ -n "$AXIOM_WEBHOOK_SECRET" ] && PARAM_ARGS+=("axiomWebhookSecret=$AXIOM_WEBHOOK_SECRET")
        
        az deployment sub validate \
          --name "main-${GITHUB_RUN_ID}" \
          --location ${{ inputs.location }} \
          --template-file infrastructure/main.bicep \
          "${PARAM_ARGS[@]}"
          
    - name: Deploy infrastructure
      id: deploy
      run: |
        echo "🚀 Deploying infrastructure to ${{ inputs.environment }}..."
        PARAM_FILE="infrastructure/parameters/${{ inputs.environment }}.parameters.json"
        PARAM_ARGS=(--parameters "@${PARAM_FILE}")
        
        # Add secret parameters if they exist
        [ -n "$BATCHDATA_KEY" ] && PARAM_ARGS+=("batchDataApiKey=$BATCHDATA_KEY")
        [ -n "$GOOGLE_MAPS_API_KEY" ] && PARAM_ARGS+=("googleMapsApiKey=$GOOGLE_MAPS_API_KEY")
        [ -n "$AZURE_OPENAI_API_KEY" ] && PARAM_ARGS+=("azureOpenAiApiKey=$AZURE_OPENAI_API_KEY")
        [ -n "$AZURE_OPENAI_ENDPOINT" ] && PARAM_ARGS+=("azureOpenAiEndpoint=$AZURE_OPENAI_ENDPOINT")
        [ -n "$GOOGLE_GEMINI_API_KEY" ] && PARAM_ARGS+=("googleGeminiApiKey=$GOOGLE_GEMINI_API_KEY")
        [ -n "$CENSUS_API_KEY" ] && PARAM_ARGS+=("censusApiKey=$CENSUS_API_KEY")
        [ -n "$BRIDGE_SERVER_TOKEN" ] && PARAM_ARGS+=("bridgeServerToken=$BRIDGE_SERVER_TOKEN")
        [ -n "$NPS_API_KEY" ] && PARAM_ARGS+=("npsApiKey=$NPS_API_KEY")
        [ -n "$SAMBANOVA_API_KEY" ] && PARAM_ARGS+=("sambanovaApiKey=$SAMBANOVA_API_KEY")
        [ -n "$AZURE_COMMUNICATION_API_KEY" ] && PARAM_ARGS+=("azureCommunicationApiKey=$AZURE_COMMUNICATION_API_KEY")
        [ -n "$AZURE_TENANT_ID" ] && PARAM_ARGS+=("azureTenantId=$AZURE_TENANT_ID")
        [ -n "$AZURE_CLIENT_ID" ] && PARAM_ARGS+=("azureClientId=$AZURE_CLIENT_ID")
        [ -n "$AZURE_CLIENT_SECRET" ] && PARAM_ARGS+=("azureClientSecret=$AZURE_CLIENT_SECRET")
        [ -n "$AXIOM_WEBHOOK_SECRET" ] && PARAM_ARGS+=("axiomWebhookSecret=$AXIOM_WEBHOOK_SECRET")
        
        deployment_output=$(az deployment sub create \
          --name "main-${GITHUB_RUN_ID}" \
          --location ${{ inputs.location }} \
          --template-file infrastructure/main.bicep \
          "${PARAM_ARGS[@]}" \
          --query 'properties.outputs' \
          --output json)
        
        echo "📋 Deployment completed successfully!"
        echo "$deployment_output" | jq '.'
        
        # Extract outputs
        resource_group=$(echo "$deployment_output" | jq -r '.resourceGroupName.value')
        app_service_name=$(echo "$deployment_output" | jq -r '.appServiceName.value')
        app_service_url=$(echo "$deployment_output" | jq -r '.appServiceUrl.value')
        key_vault_name=$(echo "$deployment_output" | jq -r '.keyVaultName.value')
        sftp_storage_account=$(echo "$deployment_output" | jq -r '.sftpStorageAccountName.value')
        apim_name=$(echo "$deployment_output" | jq -r '.apimName.value')
        
        # Set outputs
        echo "resourceGroupName=$resource_group" >> $GITHUB_OUTPUT
        echo "appServiceName=$app_service_name" >> $GITHUB_OUTPUT
        echo "appServiceUrl=$app_service_url" >> $GITHUB_OUTPUT
        echo "keyVaultName=$key_vault_name" >> $GITHUB_OUTPUT
        echo "sftpStorageAccountName=$sftp_storage_account" >> $GITHUB_OUTPUT
        echo "apimName=$apim_name" >> $GITHUB_OUTPUT
        
        echo "✅ Infrastructure deployment outputs:"
        echo "   Resource Group: $resource_group"
        echo "   App Service: $app_service_name"
        echo "   App Service URL: $app_service_url"
        echo "   Key Vault: $key_vault_name"
        echo "   APIM: $apim_name"

    - name: Provision SFTP local user (idempotent)
      run: |
        SFTP_ACCOUNT="${{ steps.deploy.outputs.sftpStorageAccountName }}"
        KV_NAME="${{ steps.deploy.outputs.keyVaultName }}"
        RG="${{ steps.deploy.outputs.resourceGroupName }}"
        SUB="${{ env.AZURE_SUBSCRIPTION_ID }}"

        if [[ -z "$SFTP_ACCOUNT" || "$SFTP_ACCOUNT" == "null" ]]; then
          echo "⏭️  Skipping — sftpStorageAccountName not in deployment outputs."
          exit 0
        fi

        USER_URL="https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Storage/storageAccounts/${SFTP_ACCOUNT}/localUsers/statebridge?api-version=2023-04-01"
        REGEN_URL="https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Storage/storageAccounts/${SFTP_ACCOUNT}/localUsers/statebridge/regeneratePassword?api-version=2023-04-01"

        # Desired config: homeDirectory=statebridge, rcwld on the statebridge container.
        # 'd' (delete) is REQUIRED for SFTP rename operations on ADLS Gen2 (HNS).
        # Without 'd', SFTP clients using resume/transfer support (WinSCP, FileZilla)
        # upload as .filepart then rename — and Azure returns InsufficientAccountPermissions
        # on the rename because the rename operation checks delete permission on the source.
        # NOTE: Azure permissionScope.resourceName must be a plain container name — path-scoped
        # values like "statebridge/uploads" are rejected by the API (InvalidRequestPropertyValue).
        DESIRED_BODY='{"properties":{"hasSshKey":false,"hasSharedKey":false,"homeDirectory":"statebridge","permissionScopes":[{"permissions":"rcwld","service":"blob","resourceName":"statebridge"}]}}'
        DESIRED_PERMISSIONS="rcwld"

        # ── Step 1: Ensure user exists with correct config ────────────────────
        # Read current homeDirectory AND permissions. If either differ from desired,
        # do a PUT to fix — ARM PUT always resets hasSshPassword so we regenerate after.
        CURRENT_STATE=$(az rest --method get --url "$USER_URL" \
          --query '{home:properties.homeDirectory,perms:properties.permissionScopes[0].permissions}' \
          -o json 2>/dev/null || echo "{}")
        CURRENT_HOME=$(echo "$CURRENT_STATE" | jq -r '.home // ""')
        CURRENT_PERMS=$(echo "$CURRENT_STATE" | jq -r '.perms // ""')

        if [[ "$CURRENT_HOME" == "statebridge" && "$CURRENT_PERMS" == "$DESIRED_PERMISSIONS" ]]; then
          echo "👤 SFTP local user 'statebridge' exists with correct homeDirectory and permissions ($DESIRED_PERMISSIONS) — no PUT needed."
          NEED_REGEN=false
        else
          if [[ -z "$CURRENT_HOME" ]]; then
            echo "👤 SFTP local user 'statebridge' does not exist — creating..."
          elif [[ "$CURRENT_HOME" != "statebridge" ]]; then
            echo "👤 SFTP local user 'statebridge' has wrong homeDirectory ('${CURRENT_HOME}') — fixing..."
          else
            echo "👤 SFTP local user 'statebridge' has wrong permissions ('${CURRENT_PERMS}', expected '${DESIRED_PERMISSIONS}') — fixing..."
            echo "   NOTE: Missing 'd' (delete) permission causes SFTP rename to fail with InsufficientAccountPermissions."
          fi
          az rest --method put --url "$USER_URL" --body "$DESIRED_BODY"
          echo "✅ User 'statebridge' created/updated."
          # ARM PUT always resets hasSshPassword — must regenerate immediately.
          NEED_REGEN=true
        fi

        # ── Step 2: Manage password in Key Vault ──────────────────────────────
        # After a PUT, always regenerate (hasSshPassword was reset by ARM).
        # If user config was already correct, only regenerate if KV secret is absent.
        # To force rotation: delete the KV secret and re-run the workflow.
        if [[ "$NEED_REGEN" == "true" ]]; then
          echo "🔑 Regenerating SFTP password (required after user create/update)..."
        else
          EXISTING_PW=$(az keyvault secret show \
            --vault-name "$KV_NAME" \
            --name "sftp-statebridge-password" \
            --query value -o tsv 2>/dev/null || echo "")
          if [[ -n "$EXISTING_PW" ]]; then
            echo "🔐 Password already in Key Vault and user config is correct — nothing to do."
            echo "   To force rotation: delete the KV secret and re-run the workflow."
            echo "   Retrieve: az keyvault secret show --vault-name $KV_NAME --name sftp-statebridge-password --query value -o tsv"
            exit 0
          fi
          echo "🔑 No password found in Key Vault — generating..."
        fi

        PASSWORD=$(az rest --method post --url "$REGEN_URL" --query 'sshPassword' -o tsv)
        if [[ -z "$PASSWORD" ]]; then echo "❌ Failed to generate SFTP password."; exit 1; fi
        az keyvault secret set \
          --vault-name "$KV_NAME" \
          --name "sftp-statebridge-password" \
          --value "$PASSWORD" \
          --output none
        echo "✅ Password stored in Key Vault as 'sftp-statebridge-password'."
        echo "   Retrieve: az keyvault secret show --vault-name $KV_NAME --name sftp-statebridge-password --query value -o tsv"

    - name: Import API swagger into APIM
      run: |
        APIM_NAME="${{ steps.deploy.outputs.apimName }}"
        if [[ -z "$APIM_NAME" || "$APIM_NAME" == "null" ]]; then
          echo "⏭️  Skipping APIM swagger import — apimName output not present (APIM not deployed in this stack)."
          exit 0
        fi
        echo "📋 Importing API swagger spec into APIM (spec exceeds Bicep 128 KB limit)..."
        RG="${{ steps.deploy.outputs.resourceGroupName }}"
        SERVICE_URL="${{ steps.deploy.outputs.appServiceUrl }}"

        az apim api import \
          --resource-group "$RG" \
          --service-name "$APIM_NAME" \
          --path '' \
          --specification-format OpenApiJson \
          --specification-path infrastructure/api-swagger.json \
          --api-id appraisal-management-api \
          --display-name 'Appraisal Management API' \
          --protocols https \
          --subscription-required false \
          --service-url "$SERVICE_URL"
        echo "✅ Swagger spec imported into APIM: $APIM_NAME"

    - name: Verify deployment
      run: |
        echo "🔍 Verifying deployment..."
        
        # Check resource group
        az group show --name ${{ steps.deploy.outputs.resourceGroupName }} --output table
        
        # Check key resources
        echo "📋 Checking deployed resources..."
        az resource list \
          --resource-group ${{ steps.deploy.outputs.resourceGroupName }} \
          --output table \
          --query '[].{Name:name, Type:type, Location:location}'
        
    - name: Update deployment summary
      run: |
        echo "## 🚀 Infrastructure Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Location | ${{ inputs.location }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Resource Group | ${{ steps.deploy.outputs.resourceGroupName }} |" >> $GITHUB_STEP_SUMMARY
        echo "| App Service | ${{ steps.deploy.outputs.appServiceName }} |" >> $GITHUB_STEP_SUMMARY
        echo "| App Service URL | [${{ steps.deploy.outputs.appServiceUrl }}](${{ steps.deploy.outputs.appServiceUrl }}) |" >> $GITHUB_STEP_SUMMARY
        echo "| Key Vault | ${{ steps.deploy.outputs.keyVaultName }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Infrastructure deployment completed successfully!" >> $GITHUB_STEP_SUMMARY

