name: Set User Identities

# Stamps Entra ID extension attributes (clientId / subClientId) onto platform
# users so those values flow into JWTs and scope Cosmos / Axiom calls correctly.
#
# When to run:
#   - After a first-time infrastructure deployment (Entra extension module must
#     have run at least once before this will succeed).
#   - Whenever scripts/user-identities.json is updated.
#   - To onboard a new user тАФ add them to user-identities.json and re-run.
#
# Required GitHub environment secrets (shared with infrastructure.yml):
#   AZURE_CREDENTIALS   тАУ Service principal JSON (az ad sp create-for-rbac --sdk-auth)
#   AZURE_TENANT_ID     тАУ Entra tenant GUID
#   AZURE_CLIENT_ID     тАУ App registration client ID (used to derive extension attr namespace)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment (dev, staging, prod)'
    secrets:
      AZURE_CREDENTIALS:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_CLIENT_ID:
        required: false

  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        description: 'Target environment'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  set-identities:
    name: Set User Identities (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # Used by set-user-identity.ts to derive the extension attribute namespace.
      # Falls back to the hardcoded app reg ID in the script if not set.
      AZURE_API_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stamp user identities
        run: |
          ENV="${{ inputs.environment }}"
          CONFIG_FILE="scripts/user-identities.json"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "тЭМ Config file not found: $CONFIG_FILE"
            exit 1
          fi

          # Extract users for this environment
          USERS=$(jq -c --arg env "$ENV" '.[$env] // []' "$CONFIG_FILE")
          COUNT=$(echo "$USERS" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "тЪая╕П  No users configured for environment '$ENV' in $CONFIG_FILE тАФ nothing to do."
            exit 0
          fi

          echo "ЁЯСе Stamping $COUNT user(s) for '$ENV'..."
          FAILED=0

          for row in $(echo "$USERS" | jq -r '.[] | @base64'); do
            _jq() { echo "$row" | base64 --decode | jq -r "$1"; }
            UPN=$(_jq '.upn')
            CLIENT_ID=$(_jq '.clientId')
            SUB_CLIENT_ID=$(_jq '.subClientId')
            ROLE=$(_jq '.role // ""')

            echo ""
            echo "ЁЯФН Resolving object ID for: $UPN"
            # Resolve UPN тЖТ Entra object ID; fail clearly if user doesn't exist.
            OBJECT_ID=$(az ad user show --id "$UPN" --query id -o tsv 2>/dev/null || echo '')

            if [ -z "$OBJECT_ID" ]; then
              echo "  тЭМ Could not resolve '$UPN' тАФ user may not exist in this tenant. Skipping."
              FAILED=$((FAILED + 1))
              continue
            fi

            echo "  тЬЕ Resolved тЖТ $OBJECT_ID"
            echo "  ЁЯУЭ clientId=$CLIENT_ID  subClientId=$SUB_CLIENT_ID  role=$ROLE"

            npx tsx scripts/set-user-identity.ts \
              --user "$OBJECT_ID" \
              --clientId "$CLIENT_ID" \
              --subClientId "$SUB_CLIENT_ID"

            # Assign App Role if specified
            if [ -n "$ROLE" ] && [ "$ROLE" != "null" ]; then
              npx tsx scripts/assign-user-role.ts \
                --user "$OBJECT_ID" \
                --role "$ROLE"
            else
              echo "  тД╣я╕П  No role configured for $UPN тАФ skipping role assignment."
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "тЭМ $FAILED user(s) could not be resolved. Check UPNs in $CONFIG_FILE."
            exit 1
          fi

          echo ""
          echo "тЬЕ All $COUNT user(s) stamped successfully."
          echo "тД╣я╕П  New values appear in tokens after the user's next sign-in or token refresh."
