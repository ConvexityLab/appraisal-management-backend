name: Deploy Appraisal Management Platform

# Prevent duplicate deployments - cancel in-progress runs when new deployment starts
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master, dev ]
    paths-ignore:
      - '.github/workflows/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to deploy (dev, staging, prod)'
        required: false
        default: 'staging'
      deploy_infrastructure:
        description: 'Set to true to run the infrastructure workflow'
        required: false
        default: 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
  NODE_VERSION: '22.x'

jobs:
  determine-environment:
    name: Determine Deployment Environment
    runs-on: ubuntu-latest
    
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      deploy-infrastructure: ${{ steps.env.outputs.deploy-infrastructure }}
    
    steps:
    - name: Determine environment
      id: env
      env:
        ENVIRONMENT_INPUT: ${{ github.event.inputs.environment }}
        DEPLOY_INFRA_INPUT: ${{ github.event.inputs.deploy_infrastructure }}
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          # Manual dispatch always wins — use the explicit input values
          DISPATCH_ENV="${ENVIRONMENT_INPUT}"
          DISPATCH_DEPLOY="${DEPLOY_INFRA_INPUT}"

          if [[ -z "$DISPATCH_ENV" ]]; then
            DISPATCH_ENV="staging"
          fi

          if [[ -z "$DISPATCH_DEPLOY" ]]; then
            DISPATCH_DEPLOY="true"
          fi

          echo "environment=$DISPATCH_ENV" >> $GITHUB_OUTPUT
          echo "deploy-infrastructure=$DISPATCH_DEPLOY" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "environment=dev" >> $GITHUB_OUTPUT
          echo "deploy-infrastructure=false" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
          echo "environment=staging" >> $GITHUB_OUTPUT
          echo "deploy-infrastructure=false" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
          echo "environment=dev" >> $GITHUB_OUTPUT
          echo "deploy-infrastructure=true" >> $GITHUB_OUTPUT
        else
          echo "environment=dev" >> $GITHUB_OUTPUT
          echo "deploy-infrastructure=false" >> $GITHUB_OUTPUT
        fi
        
        echo " Deployment Target: $(cat $GITHUB_OUTPUT | grep environment | cut -d'=' -f2)"
        echo " Deploy Infrastructure: $(cat $GITHUB_OUTPUT | grep deploy-infrastructure | cut -d'=' -f2)"

  detect-changes:
    name: Detect What Changed
    runs-on: ubuntu-latest
    outputs:
      infrastructure: ${{ steps.override.outputs.infrastructure }}
      code: ${{ steps.override.outputs.code }}
      identities: ${{ steps.override.outputs.identities }}
    steps:
    - uses: actions/checkout@v5
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          infrastructure:
            - 'infrastructure/**'
          code:
            - 'src/**'
            - 'tests/**'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'Dockerfile'
            - 'tsconfig*.json'
          identities:
            - 'scripts/user-identities.json'
    # workflow_dispatch has no diff context so dorny/paths-filter returns
    # false for all outputs. Force both to true so manual dispatches always
    # run the full pipeline.
    - name: Override outputs for workflow_dispatch
      id: override
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          DISPATCH_DEPLOY="${{ github.event.inputs.deploy_infrastructure }}"
          if [[ -z "$DISPATCH_DEPLOY" ]]; then
            DISPATCH_DEPLOY="true"
          fi

          echo "code=true" >> $GITHUB_OUTPUT
          echo "infrastructure=$DISPATCH_DEPLOY" >> $GITHUB_OUTPUT
          echo "identities=true" >> $GITHUB_OUTPUT
        else
          echo "code=${{ steps.filter.outputs.code }}" >> $GITHUB_OUTPUT
          echo "infrastructure=${{ steps.filter.outputs.infrastructure }}" >> $GITHUB_OUTPUT
          echo "identities=${{ steps.filter.outputs.identities }}" >> $GITHUB_OUTPUT
        fi

  build-and-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Type check
      run: pnpm run type-check

    - name: Run unit tests
      run: pnpm run test:unit

    - name: Build application
      run: pnpm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v5
      with:
        name: dist
        path: dist/

  run-ci-pipeline:
    name: Run CI Pipeline
    needs: [determine-environment, detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Run type checking
      run: pnpm run type-check
      
    - name: Run tests
      run: pnpm run test
      
    - name: Build application
      run: pnpm run build

  build-and-push-container:
    name: Build and Push Container Image
    needs: [determine-environment, run-ci-pipeline, detect-changes]
    if: |
      needs.detect-changes.outputs.code == 'true' &&
      needs.run-ci-pipeline.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      container-registry: ${{ steps.get-acr.outputs.registry }}
      api-image-full-name: ${{ steps.meta.outputs.api-full-image-name }}
      functions-image-full-name: ${{ steps.meta.outputs.functions-full-image-name }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Get ACR name from deployment
      id: get-acr
      run: |
        RG_NAME="rg-appraisal-mgmt-${{ needs.determine-environment.outputs.environment }}-eastus"
        ACR_NAME=$(az acr list --resource-group $RG_NAME --query '[0].name' -o tsv)
        ACR_LOGIN_SERVER=$(az acr list --resource-group $RG_NAME --query '[0].loginServer' -o tsv)
        
        echo "registry=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
        echo "name=$ACR_NAME" >> $GITHUB_OUTPUT
        
        echo " Container Registry: $ACR_LOGIN_SERVER"
        
    - name: Login to Azure Container Registry
      run: |
        az acr login --name ${{ steps.get-acr.outputs.name }}
        
    - name: Generate image metadata
      id: meta
      run: |
        # Create unique tag using git SHA and timestamp
        IMAGE_TAG="${GITHUB_SHA:0:7}-$(date +%Y%m%d%H%M%S)"
        API_FULL_IMAGE_NAME="${{ steps.get-acr.outputs.registry }}/appraisal-api:${IMAGE_TAG}"
        API_LATEST_IMAGE_NAME="${{ steps.get-acr.outputs.registry }}/appraisal-api:latest"
        FUNCTIONS_FULL_IMAGE_NAME="${{ steps.get-acr.outputs.registry }}/appraisal-functions:${IMAGE_TAG}"
        FUNCTIONS_LATEST_IMAGE_NAME="${{ steps.get-acr.outputs.registry }}/appraisal-functions:latest"
        
        echo "tags=$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "api-full-image-name=$API_FULL_IMAGE_NAME" >> $GITHUB_OUTPUT
        echo "api-latest-image-name=$API_LATEST_IMAGE_NAME" >> $GITHUB_OUTPUT
        echo "functions-full-image-name=$FUNCTIONS_FULL_IMAGE_NAME" >> $GITHUB_OUTPUT
        echo "functions-latest-image-name=$FUNCTIONS_LATEST_IMAGE_NAME" >> $GITHUB_OUTPUT
        
        echo " Image tag: $IMAGE_TAG"
        echo " API image: $API_FULL_IMAGE_NAME"
        echo " Functions image: $FUNCTIONS_FULL_IMAGE_NAME"
        
    - name: Build API Docker image
      run: |
        echo " Building API Docker image..."
        docker build \
          --tag ${{ steps.meta.outputs.api-full-image-name }} \
          --tag ${{ steps.meta.outputs.api-latest-image-name }} \
          --label "git-commit=${{ github.sha }}" \
          --label "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
          --label "environment=${{ needs.determine-environment.outputs.environment }}" \
          .

    - name: Build Functions Docker image
      run: |
        echo " Building Functions Docker image..."
        docker build \
          --file src/functions/Dockerfile \
          --tag ${{ steps.meta.outputs.functions-full-image-name }} \
          --tag ${{ steps.meta.outputs.functions-latest-image-name }} \
          --label "git-commit=${{ github.sha }}" \
          --label "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
          --label "environment=${{ needs.determine-environment.outputs.environment }}" \
          src/functions
        
    - name: Push Docker images
      run: |
        echo " Pushing Docker images..."
        docker push ${{ steps.meta.outputs.api-full-image-name }}
        docker push ${{ steps.meta.outputs.api-latest-image-name }}
        docker push ${{ steps.meta.outputs.functions-full-image-name }}
        docker push ${{ steps.meta.outputs.functions-latest-image-name }}
        echo " Images pushed successfully"

  deploy-infrastructure:
    name: Deploy Infrastructure
    needs: [determine-environment, detect-changes, build-and-push-container]
    # always() so infra still deploys when build-and-push-container is skipped
    # (no code changes) or fails. The reusable workflow's resolve-image-tags step
    # will fall back to the currently-running Container App tag in that case.
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && needs.determine-environment.outputs.deploy-infrastructure == 'true') ||
        (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.infrastructure == 'true')
      ) &&
      needs.determine-environment.result == 'success' &&
      needs.build-and-push-container.result != 'failure'
    uses: ./.github/workflows/infrastructure.yml
    with:
      environment: ${{ needs.determine-environment.outputs.environment }}
      location: 'eastus'
      # Pass the freshly-built tag so bicep deploys the new image. If build
      # was skipped (no code change), this is the empty string and the
      # reusable workflow preserves the currently-running Container App tag.
      appImageTag: ${{ needs.build-and-push-container.outputs.image-tag }}
      functionsImageTag: ${{ needs.build-and-push-container.outputs.image-tag }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AXIOM_WEBHOOK_SECRET: ${{ secrets.AXIOM_WEBHOOK_SECRET }}
      AXIOM_CLIENT_ID: ${{ secrets.AXIOM_CLIENT_ID }}
      AXIOM_SUB_CLIENT_ID: ${{ secrets.AXIOM_SUB_CLIENT_ID }}
      MOP_SERVICE_AUTH_TOKEN: ${{ secrets.MOP_SERVICE_AUTH_TOKEN }}

  # Runs after infrastructure so App Roles and extension properties are guaranteed
  # to exist before we try to stamp user attributes and assign roles.
  # Also triggers on any commit that touches scripts/user-identities.json so
  # adding or changing a user is fully automated — just commit the JSON.
  set-user-identities:
    name: Set User Identities
    needs: [determine-environment, deploy-infrastructure, detect-changes]
    if: |
      always() &&
      needs.determine-environment.result == 'success' &&
      needs.deploy-infrastructure.result != 'failure' &&
      (needs.deploy-infrastructure.result == 'success' || needs.detect-changes.outputs.identities == 'true')
    uses: ./.github/workflows/set-user-identities.yml
    with:
      environment: ${{ needs.determine-environment.outputs.environment }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  deploy-container-app:
    name: Deploy Container to Container App
    needs: [determine-environment, deploy-infrastructure, build-and-push-container, detect-changes]
    if: |
      always() &&
      needs.detect-changes.outputs.code == 'true' &&
      needs.build-and-push-container.result == 'success' &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped' || needs.deploy-infrastructure.result == 'failure')
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Get Container App names
      id: get-app
      run: |
        RG_NAME="rg-appraisal-mgmt-${{ needs.determine-environment.outputs.environment }}-eastus"
        
        API_APP_NAME=$(az containerapp list --resource-group $RG_NAME --query "[?contains(name, 'appraisalapi')].name | [0]" -o tsv)
        FUNCTIONS_APP_NAME=$(az containerapp list --resource-group $RG_NAME --query "[?contains(name, 'appraisalfunctions')].name | [0]" -o tsv)
        
        if [[ -z "$API_APP_NAME" ]] || [[ -z "$FUNCTIONS_APP_NAME" ]]; then
          echo "Unable to locate container apps in $RG_NAME"
          exit 1
        fi
        
        echo "api-name=$API_APP_NAME" >> $GITHUB_OUTPUT
        echo "functions-name=$FUNCTIONS_APP_NAME" >> $GITHUB_OUTPUT
        echo "resource-group=$RG_NAME" >> $GITHUB_OUTPUT
        
        echo " API Container App: $API_APP_NAME"
        echo " Functions Container App: $FUNCTIONS_APP_NAME"
        echo " Resource Group: $RG_NAME"
        
    - name: Resolve frontend SWA hostname
      id: swa
      run: |
        RG_NAME="${{ steps.get-app.outputs.resource-group }}"
        SWA_HOSTNAME=$(az staticwebapp list \
          --resource-group "$RG_NAME" \
          --query "[0].defaultHostname" -o tsv 2>/dev/null || true)
        if [[ -n "$SWA_HOSTNAME" ]]; then
          echo "swa-origin=https://$SWA_HOSTNAME" >> "$GITHUB_OUTPUT"
          echo " SWA origin: https://$SWA_HOSTNAME"
        else
          echo "swa-origin=" >> "$GITHUB_OUTPUT"
          echo " No SWA found in $RG_NAME — ALLOWED_ORIGINS will use secret value only"
        fi

    - name: Update API Container App with new image
      env:
        SECRET_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        SWA_ORIGIN: ${{ steps.swa.outputs.swa-origin }}
      run: |
        echo " Updating Container App with new image and environment config..."

        # Build ALLOWED_ORIGINS: secret value + dynamically resolved SWA origin
        FINAL_ORIGINS="${SECRET_ORIGINS}"
        if [[ -n "$SWA_ORIGIN" ]]; then
          if [[ -n "$FINAL_ORIGINS" ]]; then
            # Append SWA origin only if not already present
            if [[ "$FINAL_ORIGINS" != *"$SWA_ORIGIN"* ]]; then
              FINAL_ORIGINS="${FINAL_ORIGINS},${SWA_ORIGIN}"
            fi
          else
            FINAL_ORIGINS="$SWA_ORIGIN"
          fi
        fi
        echo " ALLOWED_ORIGINS: $FINAL_ORIGINS"
        
        # Determine scaling based on environment
        if [[ "${{ needs.determine-environment.outputs.environment }}" == "prod" ]]; then
          MIN_REPLICAS=2
          MAX_REPLICAS=10
        else
          MIN_REPLICAS=1
          MAX_REPLICAS=5
        fi
        
        # Resolve image: prefer the output from the build job.  When that is
        # empty (GitHub Actions drops outputs from jobs gated behind always()),
        # reconstruct the tag from the ACR registry + git SHA so we never
        # silently fall back to the stale :latest tag.
        NEW_IMAGE="${{ needs.build-and-push-container.outputs.api-image-full-name }}"
        if [[ -z "$NEW_IMAGE" ]]; then
          # Reconstruct: the build job tags images as <sha7>-<YYYYMMDDHHmmSS>.
          # We can't know the exact timestamp, so query ACR for the newest tag
          # matching this commit's short SHA.
          ACR_SERVER="${{ needs.build-and-push-container.outputs.container-registry }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          # GitHub Actions silently drops job outputs when always() is used and a
          # sibling needs-job failed. Rediscover the ACR server if output is empty.
          if [[ -z "$ACR_SERVER" ]]; then
            RG_NAME="rg-appraisal-mgmt-${{ needs.determine-environment.outputs.environment }}-eastus"
            ACR_SERVER=$(az acr list --resource-group "$RG_NAME" --query '[0].loginServer' -o tsv)
          fi
          if [[ -n "$ACR_SERVER" ]]; then
            MATCHED_TAG=$(az acr repository show-tags \
              --name "${ACR_SERVER%%.*}" \
              --repository appraisal-api \
              --orderby time_desc \
              --top 20 -o tsv 2>/dev/null | grep "^${SHORT_SHA}" | head -1 || true)
          fi
          if [[ -n "$MATCHED_TAG" && "$MATCHED_TAG" != "latest" ]]; then
            NEW_IMAGE="${ACR_SERVER}/appraisal-api:${MATCHED_TAG}"
            echo "Reconstructed image from ACR tag: $NEW_IMAGE"
          else
            echo "ERROR: Could not determine the image for commit $SHORT_SHA"
            echo "Build job output was empty and no matching ACR tag found."
            exit 1
          fi
        else
          echo "Deploying new image: $NEW_IMAGE"
        fi
        
        # AI / iVueit secrets and most service-discovery env vars are now
        # managed by bicep:
        #   - Secrets via Container App keyVaultUrl + Managed Identity refs
        #     (azure-openai-api-key, google-gemini-api-key, sambanova-api-key,
        #     ivueit-api-key, ivueit-secret) — never pass through pipeline.
        #   - Service-discovery values (AZURE_OPENAI_*, SAMBANOVA_ENDPOINT,
        #     CERTO_ENDPOINT, AZURE_COSMOS_*, storage *, AZURE_SERVICE_BUS_*,
        #     AZURE_WEB_PUBSUB_*, AZURE_FLUID_RELAY_*, AZURE_COMMUNICATION_*,
        #     etc.) come from App Configuration via appConfigLoader.ts.
        # Only deploy-time-dynamic / Functions-runtime env vars stay here.
        az containerapp update \
          --name ${{ steps.get-app.outputs.api-name }} \
          --resource-group ${{ steps.get-app.outputs.resource-group }} \
          --image "$NEW_IMAGE" \
          --min-replicas $MIN_REPLICAS \
          --max-replicas $MAX_REPLICAS \
          --set-env-vars \
            NODE_ENV=production \
            AZURE_API_CLIENT_ID=${{ secrets.AZURE_API_CLIENT_ID }} \
            AZURE_AUDIENCE=${{ secrets.AZURE_API_CLIENT_ID }} \
            ALLOWED_ORIGINS="${FINAL_ORIGINS}" \
            AXIOM_PROGRAM_ID=${{ secrets.AXIOM_PROGRAM_ID }} \
            AXIOM_PROGRAM_VERSION=${{ secrets.AXIOM_PROGRAM_VERSION }}
          # NOTE: AZURE_CLIENT_ID is intentionally NOT set here.
          # DefaultAzureCredential uses it to select a user-assigned managed identity.
          # It is provisioned by Bicep (infrastructure) alongside the identity assignment.
        
        echo " Container App updated successfully"
        echo "   - Image: $NEW_IMAGE"
        echo "   - Scale: $MIN_REPLICAS-$MAX_REPLICAS replicas"

    - name: Update Functions Container App with new image
      run: |
        echo " Updating Functions Container App with new image..."
        
        if [[ "${{ needs.determine-environment.outputs.environment }}" == "prod" ]]; then
          FUNC_MIN_REPLICAS=2
          FUNC_MAX_REPLICAS=8
        else
          FUNC_MIN_REPLICAS=1
          FUNC_MAX_REPLICAS=4
        fi

        # Resolve Functions image — same logic as the API image above.
        FUNC_NEW_IMAGE="${{ needs.build-and-push-container.outputs.functions-image-full-name }}"
        if [[ -z "$FUNC_NEW_IMAGE" ]]; then
          ACR_SERVER="${{ needs.build-and-push-container.outputs.container-registry }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          # Same always()-output-drop fallback as the API block above.
          if [[ -z "$ACR_SERVER" ]]; then
            RG_NAME="rg-appraisal-mgmt-${{ needs.determine-environment.outputs.environment }}-eastus"
            ACR_SERVER=$(az acr list --resource-group "$RG_NAME" --query '[0].loginServer' -o tsv)
          fi
          if [[ -n "$ACR_SERVER" ]]; then
            MATCHED_TAG=$(az acr repository show-tags \
              --name "${ACR_SERVER%%.*}" \
              --repository appraisal-functions \
              --orderby time_desc \
              --top 20 -o tsv 2>/dev/null | grep "^${SHORT_SHA}" | head -1 || true)
          fi
          if [[ -n "$MATCHED_TAG" && "$MATCHED_TAG" != "latest" ]]; then
            FUNC_NEW_IMAGE="${ACR_SERVER}/appraisal-functions:${MATCHED_TAG}"
            echo "Reconstructed Functions image from ACR tag: $FUNC_NEW_IMAGE"
          else
            echo "ERROR: Could not determine Functions image for commit $SHORT_SHA"
            exit 1
          fi
        else
          echo "Deploying new image: $FUNC_NEW_IMAGE"
        fi
        
        az containerapp update \
          --name ${{ steps.get-app.outputs.functions-name }} \
          --resource-group ${{ steps.get-app.outputs.resource-group }} \
          --image "$FUNC_NEW_IMAGE" \
          --min-replicas $FUNC_MIN_REPLICAS \
          --max-replicas $FUNC_MAX_REPLICAS
        
        echo " Functions Container App updated successfully"
        echo "   - Image: $FUNC_NEW_IMAGE"
        echo "   - Scale: $FUNC_MIN_REPLICAS-$FUNC_MAX_REPLICAS replicas"
        
    - name: Wait for Container App to scale up
      run: |
        echo " Waiting for container app to scale up and become ready..."
        
        max_wait=180  # 3 minutes
        elapsed=0
        
        while [ $elapsed -lt $max_wait ]; do
          replica_count=$(az containerapp replica list \
            --name ${{ steps.get-app.outputs.api-name }} \
            --resource-group ${{ steps.get-app.outputs.resource-group }} \
            --query 'length(@)' -o tsv || echo "0")
          
          if [ "$replica_count" -gt 0 ]; then
            echo " Container app has $replica_count replica(s) running"
            break
          fi
          
          echo " Waiting for replicas to start... ($elapsed/$max_wait seconds)"
          sleep 10
          elapsed=$((elapsed + 10))
        done
        
    - name: Verify deployment
      id: verify
      run: |
        echo " Verifying container deployment..."
        
        # Get the container app URL
        APP_URL=$(az containerapp show \
          --name ${{ steps.get-app.outputs.api-name }} \
          --resource-group ${{ steps.get-app.outputs.resource-group }} \
          --query 'properties.configuration.ingress.fqdn' -o tsv)
        
        echo "app-url=$APP_URL" >> $GITHUB_OUTPUT
        echo " Application URL: https://$APP_URL"
        
        # Wait for deployment to stabilize
        echo " Waiting for deployment to stabilize (30s)..."
        sleep 30
        
        # Test health endpoint with retry
        max_attempts=10
        attempt=1
        health_passed=false
        
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts: Testing https://$APP_URL/health"
          
          if curl -f -s "https://$APP_URL/health" > /dev/null; then
            echo " Health check passed!"
            health_passed=true
            break
          elif [ $attempt -eq $max_attempts ]; then
            echo " Health check failed after $max_attempts attempts"
            echo "Container may still be starting up - check logs"
            exit 1
          else
            echo " Not ready, waiting 10s..."
            sleep 10
            attempt=$((attempt + 1))
          fi
        done

    - name: Run post-deploy auth smoke tests
      run: bash scripts/smoke-test-auth.sh "https://${{ steps.verify.outputs.app-url }}"

  verify-seeded-users:
    name: Verify Seeded User Profiles
    needs: [determine-environment, deploy-container-app]
    if: |
      needs.deploy-container-app.result == 'success' &&
      (needs.determine-environment.outputs.environment == 'staging' || needs.determine-environment.outputs.environment == 'prod')
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Resolve Cosmos metadata
      id: cosmos
      run: |
        RG_NAME="rg-appraisal-mgmt-${{ needs.determine-environment.outputs.environment }}-eastus"
        COSMOS_ACCOUNT=$(az cosmosdb list --resource-group "$RG_NAME" --query '[0].name' -o tsv)
        COSMOS_ENDPOINT=$(az cosmosdb list --resource-group "$RG_NAME" --query '[0].documentEndpoint' -o tsv)

        if [[ -z "$COSMOS_ACCOUNT" || -z "$COSMOS_ENDPOINT" ]]; then
          echo "❌ Failed to resolve Cosmos account metadata in $RG_NAME"
          exit 1
        fi

        COSMOS_DATABASE_NAME=$(az cosmosdb sql database list \
          --account-name "$COSMOS_ACCOUNT" \
          --resource-group "$RG_NAME" \
          --query '[0].name' -o tsv)

        if [[ -z "$COSMOS_DATABASE_NAME" ]]; then
          echo "❌ Failed to resolve Cosmos SQL database name for account $COSMOS_ACCOUNT"
          exit 1
        fi

        echo "endpoint=$COSMOS_ENDPOINT" >> "$GITHUB_OUTPUT"
        echo "database-name=$COSMOS_DATABASE_NAME" >> "$GITHUB_OUTPUT"

        echo " Cosmos account : $COSMOS_ACCOUNT"
        echo " Cosmos endpoint: $COSMOS_ENDPOINT"
        echo " Cosmos database: $COSMOS_DATABASE_NAME"

    - name: Smoke check users container count
      env:
        COSMOS_ENDPOINT: ${{ steps.cosmos.outputs.endpoint }}
        COSMOS_DATABASE_NAME: ${{ steps.cosmos.outputs.database-name }}
        DEPLOY_ENVIRONMENT: ${{ needs.determine-environment.outputs.environment }}
      run: pnpm exec tsx scripts/live-fire/verify-users-container-count.ts

  production-promotion:
    name: Production Promotion
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-container-app]
    if: false  # DISABLED - was causing infinite deployment loop
    # if: needs.determine-environment.outputs.environment == 'staging' && needs.deploy-container-app.result == 'success'
    environment: production-approval
    
    steps:
    - name: Manual approval for production
      run: |
        echo " Production deployment requires manual approval"
        echo "Staging deployment completed successfully"
        echo "Ready to promote to production?"
        
    - name: Trigger production deployment
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'deploy.yml',
            ref: 'master',
            inputs: {
              environment: 'prod',
              deploy_infrastructure: 'true'
            }
          });

  aim-port-smoke-test:
    name: AIM-Port APIM Smoke Test
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-container-app]
    # Only run on staging; requires the APIM E2E opt-in secrets to be configured.
    # Does not fail the deployment if secrets are absent (continue-on-error).
    if: |
      needs.deploy-container-app.result == 'success' &&
      needs.determine-environment.outputs.environment == 'staging'
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Resolve Cosmos endpoint for smoke assertions
      id: cosmos
      run: |
        RG_NAME="rg-appraisal-mgmt-staging-eastus"
        COSMOS_ENDPOINT=$(az cosmosdb list --resource-group "$RG_NAME" --query '[0].documentEndpoint' -o tsv)
        if [[ -z "$COSMOS_ENDPOINT" ]]; then
          echo "❌ Could not resolve Cosmos endpoint — skipping smoke test"
          echo "endpoint=" >> "$GITHUB_OUTPUT"
        else
          echo "endpoint=$COSMOS_ENDPOINT" >> "$GITHUB_OUTPUT"
        fi

    - name: Run AIM-Port APIM E2E smoke test
      if: steps.cosmos.outputs.endpoint != ''
      continue-on-error: true  # smoke failure alerts but does not block deploy
      env:
        VITEST_APIM_E2E: 'true'
        USE_MOCK_SERVICE_BUS: 'false'
        AZURE_COSMOS_ENDPOINT: ${{ steps.cosmos.outputs.endpoint }}
        APIM_BASE_URL: 'https://apim-appraisal-staging-lqxl5v.azure-api.net'
        APIM_SUBSCRIPTION_KEY: ${{ secrets.APIM_SUBSCRIPTION_KEY }}
      run: pnpm vitest run tests/integration/aim-port-apim-e2e.integration.test.ts

  post-deployment:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-container-app, verify-seeded-users, aim-port-smoke-test]
    if: |
      always() &&
      needs.deploy-container-app.result == 'success' &&
      (needs.verify-seeded-users.result == 'success' || needs.verify-seeded-users.result == 'skipped') &&
      (needs.aim-port-smoke-test.result == 'success' || needs.aim-port-smoke-test.result == 'skipped' || needs.aim-port-smoke-test.result == 'failure')
    
    steps:
    - name: Update README badges
      run: |
        echo " Updating deployment status badges..."
        # This would update badges in README.md or create deployment artifacts
        
    - name: Notify stakeholders
      run: |
        echo " Notifying stakeholders of successful deployment..."
        echo "Environment: ${{ needs.determine-environment.outputs.environment }}"
        echo "Status: SUCCESS"
        
    - name: Create GitHub release
      if: needs.determine-environment.outputs.environment == 'prod'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: "v1.0.0-${{ github.sha }}"
        release_name: "Production Release v1.0.0-${{ github.sha }}"
        body: |
          ##  Production Deployment
          
          Successfully deployed to production environment.
          
          ### Changes
          - Latest changes from main branch
          - Infrastructure and application updates
          
          ### Verification
          -  Health checks passed
          -  Integration tests passed
          -  Performance tests passed
          
          ### Links
          - [Application URL](https://appraisal-mgmt-prod-app.azurewebsites.net)
          - [Health Check](https://appraisal-mgmt-prod-app.azurewebsites.net/health)
        draft: false
        prerelease: false

  failure-notification:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: [run-ci-pipeline, deploy-infrastructure, deploy-container-app]
    if: always() && (needs.run-ci-pipeline.result == 'failure' || needs.deploy-infrastructure.result == 'failure' || needs.deploy-container-app.result == 'failure')
    
    steps:
    # - name: Notify Teams on deployment failure
    #   uses: jdcargile/ms-teams-notification@v1.3
    #   with:
    #     github-token: ${{ github.token }}
    #     ms-teams-webhook-uri: ${{ secrets.MS_TEAMS_WEBHOOK_URI }}
    #     notification-summary: " Deployment failed for ${{ github.repository }}"
    #     notification-color: danger
    #     timezone: America/New_York
        
    - name: Create incident issue
      uses: actions/github-script@v7
      with:
        script: |
          const title = ` Deployment Failure - ${new Date().toISOString()}`;
          const body = `
          ## Deployment Failure Report
          
          **Repository:** ${context.repo.repo}
          **Branch:** ${context.ref}
          **Commit:** ${context.sha}
          **Environment:** ${{ needs.determine-environment.outputs.environment }}
          
          ### Failed Jobs
          - CI: ${{ needs.run-ci-pipeline.result }}
          - Infrastructure: ${{ needs.deploy-infrastructure.result }}
          - Container App: ${{ needs.deploy-container-app.result }}
          
          ### Next Steps
          1. Check workflow logs for detailed error information
          2. Verify Azure credentials and permissions
          3. Validate Bicep templates and parameters
          4. Fix issues and re-run deployment
          
          **Auto-generated by GitHub Actions**
          `;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['bug', 'deployment', 'high-priority']
          });